apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: rhtas-demo-ci
spec:
  description: Clone a Git repository into the shared workspace
  params:
    - name: url
      type: string
    - name: revision
      type: string
      default: main
  workspaces:
    - name: output
    - name: basic-auth
      optional: true
      description: Optional Secret with username + password (GitHub PAT) for private HTTPS repos
  steps:
    - name: clone
      image: registry.redhat.io/openshift-pipelines/pipelines-git-init-rhel8:v1.14.0
      env:
        - name: HOME
          value: /tekton/home
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        CHECKOUT_DIR="$(workspaces.output.path)"
        REPO_URL="$(params.url)"
        REVISION="$(params.revision)"

        # PVC workspaces may retain files from a previous run (no find in git-init image)
        shopt -s dotglob nullglob
        rm -rf "${CHECKOUT_DIR:?}"/*

        AUTH_DIR="$(workspaces.basic-auth.path)"
        if [[ -n "${AUTH_DIR}" && -f "${AUTH_DIR}/username" && -f "${AUTH_DIR}/password" ]]; then
          USER="$(cat "${AUTH_DIR}/username")"
          PASS="$(cat "${AUTH_DIR}/password")"
          # Inject credentials into HTTPS URL for private GitHub repos
          REPO_URL="$(echo "${REPO_URL}" | sed -E "s#https://#https://${USER}:${PASS}@#")"
        fi

        git clone --depth 1 --branch "${REVISION}" "${REPO_URL}" "${CHECKOUT_DIR}"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-build
  namespace: rhtas-demo-ci
spec:
  params:
    - name: CONTEXT
      type: string
      default: apps/hello-world
  workspaces:
    - name: source
  steps:
    - name: mvn-package
      image: registry.redhat.io/ubi9/openjdk-21:1.21
      workingDir: $(workspaces.source.path)/$(params.CONTEXT)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        mvn -q -DskipTests=false test package
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sast-semgrep
  namespace: rhtas-demo-ci
spec:
  params:
    - name: CONTEXT
      type: string
      default: apps/hello-world
  workspaces:
    - name: source
  steps:
    - name: semgrep
      image: returntocorp/semgrep:latest
      workingDir: $(workspaces.source.path)/$(params.CONTEXT)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        semgrep scan --config p/java --error --quiet .
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: buildah-push
  namespace: rhtas-demo-ci
  annotations:
    chains.tekton.dev/format: simplesigning
spec:
  params:
    - name: IMAGE
      type: string
    - name: BUILD_VERSION
      type: string
    - name: CONTEXT
      type: string
      default: apps/hello-world
  workspaces:
    - name: source
    - name: dockerconfig
  results:
    - name: IMAGE_DIGEST
      description: Digest of the built image
  steps:
    - name: build-and-push
      image: quay.io/buildah/stable:latest
      workingDir: $(workspaces.source.path)/$(params.CONTEXT)
      # OpenShift: run as root under anyuid SCC (pipelines-scc may block SETFCAP /
      # allowPrivilegeEscalation on newer clusters).
      securityContext:
        runAsUser: 0
      env:
        - name: HOME
          value: /root
        - name: STORAGE_DRIVER
          value: vfs
        - name: BUILDAH_ISOLATION
          value: chroot
        - name: BUILDAH_FORMAT
          value: docker
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Tekton mounts docker-registry secrets as .dockerconfigjson; buildah wants config.json
        mkdir -p /root/.docker
        if [[ -f "$(workspaces.dockerconfig.path)/.dockerconfigjson" ]]; then
          cp "$(workspaces.dockerconfig.path)/.dockerconfigjson" /root/.docker/config.json
        elif [[ -f "$(workspaces.dockerconfig.path)/config.json" ]]; then
          cp "$(workspaces.dockerconfig.path)/config.json" /root/.docker/config.json
        fi
        export DOCKER_CONFIG=/root/.docker

        buildah bud \
          --storage-driver vfs \
          --isolation chroot \
          --build-arg BUILD_VERSION="$(params.BUILD_VERSION)" \
          --build-arg SCENARIO=tekton \
          -t "$(params.IMAGE)" \
          -f Dockerfile .

        buildah push --storage-driver vfs --digestfile /tmp/digest "$(params.IMAGE)"
        cat /tmp/digest | tee "$(results.IMAGE_DIGEST.path)"
