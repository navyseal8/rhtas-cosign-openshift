# Grant anyuid SCC so buildah can run image builds in the Jenkins agent pod.
# Required for rootless buildah unless your cluster provides an alternative builder.
#
# oc apply -f openshift/scc-anyuid-rhtas-signer.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rhtas-signer-anyuid
  namespace: rhtas-demo-ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: rhtas-signer
    namespace: rhtas-demo-ci
