# Allows rhtas-signer (or Jenkins agent SA) to mint signing tokens via TokenRequest API.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rhtas-signer-tokenrequest
  namespace: rhtas-demo-ci
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: ["rhtas-signer"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rhtas-signer-tokenrequest
  namespace: rhtas-demo-ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rhtas-signer-tokenrequest
subjects:
  - kind: ServiceAccount
    name: rhtas-signer
    namespace: rhtas-demo-ci
